apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: f5-tts
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aihpi/F5-TTS.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: f5-tts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
