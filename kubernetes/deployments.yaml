apiVersion: apps/v1
kind: Deployment
metadata:
  name: f5tts-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: f5tts-api
  template:
    metadata:
      labels:
        app: f5tts-api
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      nodeSelector:
        accelerator: h100
      containers:
        - name: api
          image: ghcr.io/aihpi/f5-tts-optim:main
          imagePullPolicy: Always
          command:
            - python3
            - -m
            - uvicorn
            - f5_tts.demo.server:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          env:
            - name: MODEL_FILEPATH
              value: /var/tmp/model_430000.safetensors
            - name: KUGEL_AUDIO_ENABLED
              value: "true"
            - name: KUGEL_AUDIO_MODEL_ID_DE
              value: kugel-audio-german-local
            - name: KUGEL_AUDIO_MODEL_ID_EN
              value: kugel-audio-english-local
            - name: KUGEL_AUDIO_HF_REPO
              value: kugelaudio/kugelaudio-0-open
            - name: KUGEL_AUDIO_HF_REPO_EN
              value: kugelaudio/kugelaudio-0-open
            - name: KUGEL_AUDIO_PROCESSOR_PATH
              value: /workspace/F5-TTS/kugelaudio
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-volume
              mountPath: /var/tmp/
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: f5tts-model-pvc

